name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      # no `npm run build` here: the Docker build below runs it, so a broken
      # build still fails the workflow without building twice
      # PRs validate (typecheck + image builds) without publishing
      # buildx with the container driver: the default docker driver can't
      # export layer cache, which is what makes the gha cache below work
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          build-args: IMAGE_VERSION=${{ github.sha }}
          # the npm ci layer is the expensive one (better-sqlite3 and argon2
          # build from source); mode=max keeps the build stage's layers too,
          # not just the ones that survive into the final image
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/xp-desktop-portfolio:latest
            ghcr.io/${{ github.repository_owner }}/xp-desktop-portfolio:${{ github.sha }}
